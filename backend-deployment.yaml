apiVersion: apps/v1
kind: Deployment

metadata:
  name: notes-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notes-backend

  strategy:
    type: Recreate

  template:

    metadata:
      labels:
        app: notes-backend

    spec:

      containers:

      - name: backend

        image: notes-backend:v7

        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        env:

        - name: MONGO_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MONGO_HOST

        - name: MONGO_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MONGO_PORT

        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV

        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: API_URL

        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: MONGO_USERNAME

        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: MONGO_PASSWORD

